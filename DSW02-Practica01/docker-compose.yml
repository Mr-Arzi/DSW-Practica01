services:
  postgres:
    image: postgres:16
    container_name: empleados-postgres
    environment:
      POSTGRES_DB: empleados
      POSTGRES_USER: empleados_user
      POSTGRES_PASSWORD: empleados_pass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U empleados_user -d empleados"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - empleados-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: empleados-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/empleados
      SPRING_DATASOURCE_USERNAME: empleados_user
      SPRING_DATASOURCE_PASSWORD: empleados_pass
      APP_SECURITY_ADMIN_USERNAME: admin
      APP_SECURITY_ADMIN_PASSWORD: admin123
      APP_SECURITY_LECTOR_USERNAME: lector
      APP_SECURITY_LECTOR_PASSWORD: lector123
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/8080'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    expose:
      - "8080"
    networks:
      - empleados-network

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: empleados-frontend
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "4200"
    networks:
      - empleados-network
    environment:
      - NODE_ENV=production

  nginx:
    image: nginx:1.27-alpine
    container_name: empleados-nginx
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - empleados-network

volumes:
  postgres_data:

networks:
  empleados-network:
    driver: bridge
