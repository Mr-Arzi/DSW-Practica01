openapi: 3.0.3
info:
  title: API Employee Authentication
  version: 1.0.0
  description: Contract for employee email/password authentication endpoint.
servers:
  - url: http://localhost:8080
paths:
  /api/v1/auth/login:
    post:
      summary: Authenticate employee credentials
      operationId: loginEmpleado
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              default:
                value:
                  email: empleado@empresa.com
                  password: string
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginSuccessResponse'
              examples:
                default:
                  value:
                    message: Authentication successful
        '400':
          description: Request validation error (missing or invalid fields)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              examples:
                default:
                  value:
                    error: "Validation failed: email must be a well-formed email address"
        '401':
          description: Invalid email or password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginErrorResponse'
              examples:
                default:
                  value:
                    error: Invalid email or password
components:
  schemas:
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1
    LoginSuccessResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          enum:
            - Authentication successful
    LoginErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          enum:
            - Invalid email or password
    ValidationErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          description: Human-readable validation failure description
