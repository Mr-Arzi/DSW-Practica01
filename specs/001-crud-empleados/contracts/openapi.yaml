openapi: 3.0.3
info:
  title: API CRUD Empleados
  version: 1.1.0
  description: Contrato API versionada para gestión de empleados con baja lógica y paginación. Todos los endpoints expuestos requieren HTTP Basic; credenciales iniciales se configuran externamente y cualquier endpoint fuera de `/api/v1` responde `404 Not Found`.
servers:
  - url: http://localhost:8080
security:
  - basicAuth: []
paths:
  /api/v1/empleados:
    get:
      summary: Listar empleados activos (paginado)
      operationId: listEmpleados
      security:
        - basicAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
      responses:
        '200':
          description: Colección paginada de empleados activos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEmpleadoResponse'
        '400':
          description: Parámetros de paginación inválidos
        '401':
          description: No autenticado o credenciales inválidas
    post:
      summary: Crear empleado
      operationId: createEmpleado
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmpleadoCreateRequest'
      responses:
        '201':
          description: Empleado creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmpleadoResponse'
        '400':
          description: Error de validación
        '401':
          description: No autenticado o credenciales inválidas
        '403':
          description: Sin permisos (requiere rol ADMIN)
        '409':
          description: Clave ya existente
  /api/v1/empleados/{clave}:
    parameters:
      - name: clave
        in: path
        required: true
        schema:
          type: string
          pattern: '^EMP-[0-9]+$'
    get:
      summary: Consultar empleado activo por clave
      operationId: getEmpleadoByClave
      security:
        - basicAuth: []
      responses:
        '200':
          description: Empleado encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmpleadoResponse'
        '400':
          description: Formato de clave inválido
        '401':
          description: No autenticado o credenciales inválidas
        '404':
          description: No encontrado en catálogo activo
    put:
      summary: Actualizar empleado activo
      operationId: updateEmpleado
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmpleadoUpdateRequest'
      responses:
        '200':
          description: Empleado actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmpleadoResponse'
        '400':
          description: Error de validación
        '401':
          description: No autenticado o credenciales inválidas
        '403':
          description: Sin permisos (requiere rol ADMIN)
        '404':
          description: No encontrado en catálogo activo
    delete:
      summary: Baja lógica de empleado
      operationId: deleteEmpleado
      security:
        - basicAuth: []
      responses:
        '204':
          description: Empleado marcado como inactivo
        '400':
          description: Formato de clave inválido
        '401':
          description: No autenticado o credenciales inválidas
        '403':
          description: Sin permisos (requiere rol ADMIN)
        '404':
          description: No encontrado
        '409':
          description: Operación no aplicable (ya inactivo)
components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
  schemas:
    EmpleadoCreateRequest:
      type: object
      required: [nombre, direccion, telefono]
      properties:
        nombre:
          type: string
          maxLength: 100
        direccion:
          type: string
          maxLength: 100
        telefono:
          type: string
          maxLength: 100
          pattern: '^[0-9]{1,100}$'
    EmpleadoUpdateRequest:
      type: object
      required: [nombre, direccion, telefono]
      properties:
        nombre:
          type: string
          maxLength: 100
        direccion:
          type: string
          maxLength: 100
        telefono:
          type: string
          maxLength: 100
          pattern: '^[0-9]{1,100}$'
    EmpleadoResponse:
      type: object
      required: [prefijoClave, numeroClave, clave, nombre, direccion, telefono, activo]
      properties:
        prefijoClave:
          type: string
          enum: ['EMP-']
        numeroClave:
          type: integer
          minimum: 1
        clave:
          type: string
          pattern: '^EMP-[0-9]+$'
        nombre:
          type: string
        direccion:
          type: string
        telefono:
          type: string
        activo:
          type: boolean
    PaginatedEmpleadoResponse:
      type: object
      required: [page, limit, total, data]
      properties:
        page:
          type: integer
          minimum: 1
        limit:
          type: integer
          minimum: 1
          maximum: 100
        total:
          type: integer
          minimum: 0
        data:
          type: array
          items:
            $ref: '#/components/schemas/EmpleadoResponse'
