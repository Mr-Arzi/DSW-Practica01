name: ci

on:
  push:
    branches:
      - master
      - develop
  pull_request:
    branches:
      - master
      - develop

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: DSW02-Practica01
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Run tests
        run: mvn -B test

  frontend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: empleados
          POSTGRES_USER: empleados_user
          POSTGRES_PASSWORD: empleados_pass
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U empleados_user -d empleados"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      APP_SECURITY_ADMIN_USERNAME: admin
      APP_SECURITY_ADMIN_PASSWORD: admin123
      APP_SECURITY_LECTOR_USERNAME: lector
      APP_SECURITY_LECTOR_PASSWORD: lector123
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5433/empleados
      SPRING_DATASOURCE_USERNAME: empleados_user
      SPRING_DATASOURCE_PASSWORD: empleados_pass
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Run unit tests
        run: npm test
      - name: Start backend
        working-directory: DSW02-Practica01
        run: mvn -B spring-boot:run > /tmp/backend.log 2>&1 &

      - name: Start frontend
        run: npm start > /tmp/frontend.log 2>&1 &

      - name: Wait for services
        run: |
          for i in {1..120}; do
            if bash -c '</dev/tcp/localhost/8080' 2>/dev/null && bash -c '</dev/tcp/localhost/4200' 2>/dev/null; then
              echo "Backend y frontend listos"
              exit 0
            fi
            sleep 2
          done
          echo "Servicios no disponibles a tiempo"
          echo "--- Backend log ---"
          tail -n 200 /tmp/backend.log || true
          echo "--- Frontend log ---"
          tail -n 200 /tmp/frontend.log || true
          exit 1

      - name: Run Cypress login spec
        run: npm run cypress:run -- --spec "cypress/e2e/auth/login.cy.ts"
      - name: Build
        run: npm run build


