<section class="login-wrap">
  <div class="login-hero">
    <p class="login-kicker">Acceso seguro</p>
    <h1>Gestion de Personal</h1>
    <p class="login-copy">
      Un unico panel para administrar empleados y departamentos con una experiencia rapida y clara.
    </p>
    <div class="login-stats" aria-hidden="true">
      <div>
        <strong>24/7</strong>
        <span>Operacion continua</span>
      </div>
      <div>
        <strong>100%</strong>
        <span>Control del personal</span>
      </div>
    </div>
  </div>

  <form class="card" [formGroup]="form" (ngSubmit)="submit()">
    <h2>Iniciar sesion</h2>

    <label for="email">Correo</label>
    <input id="email" type="email" formControlName="email" autocomplete="email" />

    <label for="password">Contrasena</label>
    <input id="password" type="password" formControlName="password" autocomplete="current-password" />

    <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

    <button type="submit" [disabled]="isSubmitting">Entrar</button>
  </form>
</section>
